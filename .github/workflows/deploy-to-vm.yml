name: Deployment

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: "Deploy to Production (VM)"
    runs-on: [self-hosted, linux]
    environment: Production (VM)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server
        run: |
          chmod +x .github/workflows/scripts/deployment_vm.sh
          ./.github/workflows/scripts/deployment_vm.sh
        env:
          PROJECT_PATH: ${{ vars.VM_PROJECT_PATH }}
          COMMIT_SHA: ${{ github.sha }}