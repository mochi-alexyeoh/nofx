# NOFX Production Deployment
# 用户部署专用 - 使用官方预构建镜像
#
# 一键部署命令:
# curl -fsSL https://raw.githubusercontent.com/NoFxAiOS/nofx/main/install.sh | bash
#
# 或手动部署:
# curl -O https://raw.githubusercontent.com/NoFxAiOS/nofx/main/docker-compose.prod.yml
# docker compose -f docker-compose.prod.yml up -d

services:
  nofx:
    #image: ghcr.io/nofxaios/nofx/nofx-backend:latest
    build:
      context: .
      dockerfile: ./docker/Dockerfile.backend
    container_name: nofx-trading
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${NOFX_BACKEND_PORT:-8080}:8080"
    volumes:
      # Data directory for database and logs
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - TZ=${NOFX_TIMEZONE:-Asia/Shanghai}
      - AI_MAX_TOKENS=8000
    networks:
      - nofx-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nofx-frontend:
    #image: ghcr.io/nofxaios/nofx/nofx-frontend:latest
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend.prod
    container_name: nofx-frontend
    restart: unless-stopped
    ports:
      - "${NOFX_FRONTEND_PORT:-3000}:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot:ro
    networks:
      - nofx-network
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-nofx.com}
    depends_on:
      - nofx
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  certbot:
    image: lscr.io/linuxserver/certbot:latest
    container_name: nofx-certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock # Allows certbot to talk to Docker
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${NOFX_TIMEZONE:-Asia/Shanghai}
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --deploy-hook \"docker exec nofx-frontend nginx -s reload\"; sleep 12h & wait $${!}; done;'"
    networks:
      - nofx-network
    restart: unless-stopped

networks:
  nofx-network:
    driver: bridge
